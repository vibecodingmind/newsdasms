# =============================================================================
# SDASMS — cPanel .htaccess (place in /home/USERNAME/public_html/.htaccess)
# Routes all traffic to the Node.js app running on port 3000
# =============================================================================

RewriteEngine On

# Force HTTPS
RewriteCond %{HTTPS} off
RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

# Force www to non-www (or vice versa — adjust if you prefer www)
RewriteCond %{HTTP_HOST} ^www\.(.*)$ [NC]
RewriteRule ^(.*)$ https://%1%{REQUEST_URI} [L,R=301]

# Proxy all requests to Node.js app on port 3000
# This works when using cPanel's Node.js App (Phusion Passenger)
# If your cPanel uses Apache mod_proxy, uncomment the lines below:
#
# RewriteCond %{SERVER_PORT} 80
# RewriteRule ^(.*)$ http://127.0.0.1:3000/$1 [P,L]
#
# RewriteCond %{SERVER_PORT} 443
# RewriteRule ^(.*)$ http://127.0.0.1:3000/$1 [P,L]

# If using Passenger (most common cPanel Node.js setup),
# the .htaccess is NOT needed — Passenger handles routing automatically.
# Just create the Node.js App in cPanel and point it to the app directory.
